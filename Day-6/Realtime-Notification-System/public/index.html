<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Notification System</title>
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #e74c3c;
        }

        .status-indicator.connected {
            background: #2ecc71;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .panel {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .notifications-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .notification-item {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
            background: #f8f9fa;
        }

        .notification-item.info {
            border-left-color: #3498db;
        }

        .notification-item.success {
            border-left-color: #2ecc71;
        }

        .notification-item.warning {
            border-left-color: #f39c12;
        }

        .notification-item.error {
            border-left-color: #e74c3c;
        }

        .notification-item.read {
            opacity: 0.6;
        }

        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .notification-title {
            font-weight: 600;
            color: #333;
        }

        .notification-time {
            font-size: 12px;
            color: #999;
        }

        .notification-message {
            color: #666;
            margin-top: 5px;
        }

        .notification-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            margin-left: 10px;
        }

        .notification-badge.info {
            background: #3498db;
            color: white;
        }

        .notification-badge.success {
            background: #2ecc71;
            color: white;
        }

        .notification-badge.warning {
            background: #f39c12;
            color: white;
        }

        .notification-badge.error {
            background: #e74c3c;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔔 Real-time Notification System</h1>
            <div class="status">
                <div class="status-indicator" id="statusIndicator"></div>
                <span id="statusText">Disconnected</span>
                <span style="margin-left: auto; color: #666;" id="userInfo"></span>
            </div>
        </div>

        <div class="main-content">
            <div class="panel">
                <h2>Connect to Server</h2>
                <div class="form-group">
                    <label for="userId">User ID</label>
                    <input type="text" id="userId" placeholder="Enter your user ID" value="user123">
                </div>
                <button onclick="connect()" id="connectBtn">Connect</button>
                <button onclick="disconnect()" id="disconnectBtn" disabled>Disconnect</button>

                <h2 style="margin-top: 30px;">Send Notification</h2>
                <div class="form-group">
                    <label for="targetUserId">Target User ID (leave empty for broadcast)</label>
                    <input type="text" id="targetUserId" placeholder="user456">
                </div>
                <div class="form-group">
                    <label for="notifTitle">Title</label>
                    <input type="text" id="notifTitle" placeholder="Notification title">
                </div>
                <div class="form-group">
                    <label for="notifMessage">Message</label>
                    <textarea id="notifMessage" placeholder="Notification message"></textarea>
                </div>
                <div class="form-group">
                    <label for="notifType">Type</label>
                    <select id="notifType">
                        <option value="info">Info</option>
                        <option value="success">Success</option>
                        <option value="warning">Warning</option>
                        <option value="error">Error</option>
                    </select>
                </div>
                <div class="button-group">
                    <button onclick="sendNotification()" id="sendBtn" disabled>Send</button>
                    <button onclick="sendBroadcast()" id="broadcastBtn" disabled>Broadcast to All</button>
                </div>
            </div>

            <div class="panel">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h2 style="margin: 0; border: none; padding: 0;">Notifications</h2>
                    <button onclick="markAllAsRead()" id="markAllBtn" disabled>Mark All Read</button>
                </div>
                <div class="notifications-list" id="notificationsList">
                    <div class="empty-state">
                        <p>No notifications yet</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let socket = null;
        let currentUserId = null;
        let notifications = [];

        // Auto-connect function that runs when page loads
        function autoConnect() {
            const savedUserId = localStorage.getItem('notificationUserId');
            if (savedUserId) {
                document.getElementById('userId').value = savedUserId;
                currentUserId = savedUserId;
                
                socket = io('http://localhost:3000', {
                    reconnection: true,
                    reconnectionDelay: 1000,
                    reconnectionDelayMax: 5000,
                    reconnectionAttempts: Infinity,
                    autoConnect: true
                });
                
                setupSocketListeners();
            }
        }

        // Extract socket listeners into a separate function
        function setupSocketListeners() {
            socket.on('connect', () => {
                console.log('Connected to server');
                updateStatus(true);
                if (currentUserId) {
                    socket.emit('register', { userId: currentUserId });
                }
            });
            
            socket.on('registered', (data) => {
                console.log('Registered:', data);
                document.getElementById('userInfo').textContent = `Logged in as: ${data.userId}`;
                if (data.pendingNotifications && data.pendingNotifications.length > 0) {
                    data.pendingNotifications.forEach(notif => addNotification(notif));
                }
            });
            
            socket.on('notification', (notification) => {
                console.log('New notification:', notification);
                addNotification(notification);
                showBrowserNotification(notification);
            });
            
            socket.on('disconnect', () => {
                console.log('Disconnected from server');
                updateStatus(false);
            });
            
            socket.on('connectedUsers', (data) => {
                console.log('Connected users:', data.count);
            });
            
            socket.on('reconnect', (attemptNumber) => {
                console.log('Reconnected after', attemptNumber, 'attempts');
                if (currentUserId) {
                    socket.emit('register', { userId: currentUserId });
                }
            });
            
            socket.on('reconnect_attempt', (attemptNumber) => {
                console.log('Reconnection attempt:', attemptNumber);
            });
            
            socket.on('reconnect_error', (error) => {
                console.log('Reconnection error:', error);
            });
            
            socket.on('reconnect_failed', () => {
                console.log('Reconnection failed');
                updateStatus(false);
            });
        }

        function connect() {
            const userId = document.getElementById('userId').value.trim();
            if (!userId) {
                alert('Please enter a user ID');
                return;
            }
            
            // Save to localStorage
            localStorage.setItem('notificationUserId', userId);
            currentUserId = userId;
            
            socket = io('http://localhost:3000', {
                reconnection: true,
                reconnectionDelay: 1000,
                reconnectionDelayMax: 5000,
                reconnectionAttempts: Infinity,
                autoConnect: true
            });
            
            setupSocketListeners();
        }

        function disconnect() {
            if (socket) {
                socket.disconnect();
                socket = null;
                currentUserId = null;
                localStorage.removeItem('notificationUserId');
                updateStatus(false);
                document.getElementById('userInfo').textContent = '';
            }
        }

        function updateStatus(connected) {
            const indicator = document.getElementById('statusIndicator');
            const text = document.getElementById('statusText');
            const connectBtn = document.getElementById('connectBtn');
            const disconnectBtn = document.getElementById('disconnectBtn');
            const sendBtn = document.getElementById('sendBtn');
            const broadcastBtn = document.getElementById('broadcastBtn');
            const markAllBtn = document.getElementById('markAllBtn');

            if (connected) {
                indicator.classList.add('connected');
                text.textContent = 'Connected';
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
                sendBtn.disabled = false;
                broadcastBtn.disabled = false;
                markAllBtn.disabled = false;
            } else {
                indicator.classList.remove('connected');
                text.textContent = 'Disconnected';
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
                sendBtn.disabled = true;
                broadcastBtn.disabled = true;
                markAllBtn.disabled = true;
            }
        }

        function sendNotification() {
            const targetUserId = document.getElementById('targetUserId').value.trim();
            const title = document.getElementById('notifTitle').value.trim();
            const message = document.getElementById('notifMessage').value.trim();
            const type = document.getElementById('notifType').value;

            if (!title || !message) {
                alert('Please enter title and message');
                return;
            }

            if (!targetUserId) {
                alert('Please enter target user ID or use broadcast');
                return;
            }

            socket.emit('sendNotification', {
                userId: targetUserId,
                title,
                message,
                type,
                broadcast: false
            });

            clearForm();
        }

        function sendBroadcast() {
            const title = document.getElementById('notifTitle').value.trim();
            const message = document.getElementById('notifMessage').value.trim();
            const type = document.getElementById('notifType').value;

            if (!title || !message) {
                alert('Please enter title and message');
                return;
            }

            socket.emit('sendNotification', {
                title,
                message,
                type,
                broadcast: true
            });

            clearForm();
        }

        function clearForm() {
            document.getElementById('notifTitle').value = '';
            document.getElementById('notifMessage').value = '';
            document.getElementById('notifType').value = 'info';
        }

        function addNotification(notification) {
            notifications.unshift(notification);
            renderNotifications();
        }

        function renderNotifications() {
            const list = document.getElementById('notificationsList');
            
            if (notifications.length === 0) {
                list.innerHTML = '<div class="empty-state"><p>No notifications yet</p></div>';
                return;
            }

            list.innerHTML = notifications.map(notif => `
                <div class="notification-item ${notif.type} ${notif.read ? 'read' : ''}">
                    <div class="notification-header">
                        <div>
                            <span class="notification-title">${notif.title}</span>
                            <span class="notification-badge ${notif.type}">${notif.type}</span>
                        </div>
                        <span class="notification-time">${formatTime(notif.createdAt)}</span>
                    </div>
                    <div class="notification-message">${notif.message}</div>
                </div>
            `).join('');
        }

        function markAllAsRead() {
            if (socket) {
                socket.emit('markAllAsRead');
                notifications.forEach(n => n.read = true);
                renderNotifications();
            }
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString();
        }

        function showBrowserNotification(notification) {
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification(notification.title, {
                    body: notification.message,
                    icon: '🔔'
                });
            }
        }

        function requestNotificationPermission() {
            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission();
            }
        }

        // Initialize on page load
        window.onload = function() {
            autoConnect();
            requestNotificationPermission();
        };
    </script>
</body>
</html>
